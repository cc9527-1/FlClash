name: build-unsigned

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    name: Build Android APK (unsigned)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: dart setup.dart android -v

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: artifact-android
          path: ./dist/*
          overwrite: true

  build-windows:
    name: Build Windows Installer (unsigned)
    runs-on: windows-2022
    steps:
      - name: Enable git long paths
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Build Windows
        run: dart setup.dart windows -v

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: artifact-windows
          path: ./dist/*
          overwrite: true

  create-release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: List files
        run: ls -la ./dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          name: FlClash ${{ github.ref_name }}
          body: |
            ## FlClash with Speed Test Ranking

            Automated build includes:
            - Android APK (unsigned debug, .dev suffix)
            - Windows installer

            New feature: Speed Test Ranking (download speed test via Clash proxy)
