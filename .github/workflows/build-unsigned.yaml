name: build-unsigned

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Build Android APK (debug)
        run: |
          # Build with debug mode to avoid signing requirement
          flutter build apk --debug --split-per-abi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: artifact-android
          path: build/app/outputs/flutter-apk/*.apk
          overwrite: true

  build-windows:
    name: Build Windows Installer
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Enable git long paths
        run: git config --global core.longpaths true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Build Windows
        run: dart setup.dart windows -v
        env:
          ANDROID_ARCH: ""

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: artifact-windows
          path: ./dist/*
          overwrite: true

  create-release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: List files
        run: ls -la ./dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          name: Release ${{ github.ref_name }}
          body: |
            ## FlClash with Speed Test Ranking

            Automated build with speed test ranking feature:
            - Android APK (debug, unsigned)
            - Windows installer
            
            See https://github.com/cc9527-1/FlClash for source code.
